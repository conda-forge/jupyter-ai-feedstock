context:
  version: "2.31.7"
  build_number: 0
  python_min: "3.9"

recipe:
  # `recipe.name` is ignored in this recipe. It is just set to suppress a
  # warning raised by the `conda-forge-linting` service.
  #
  # See: https://rattler.build/latest/reference/recipe_file/#outputs-section
  name: jupyter-ai-monorepo
  version: ${{ version }}

build:
  number: ${{ build_number }}

outputs:
  - package:
      name: jupyter-ai
      version: ${{ version }}

    source:
      url: https://pypi.org/packages/source/j/jupyter-ai/jupyter_ai-${{ version }}.tar.gz
      sha256: 88289ee0fabdfa9e1883a0089c9afa36a0cc916c81e81b6f4e2655f000437159

    build:
      noarch: python
      script: ${{ PYTHON }} -m pip install . -vv
      number: ${{ build_number }}

    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling >=1.4.0
        - jupyterlab >=4.0,<5
        - hatch-nodejs-version
        - pip
        - hatch-jupyter-builder
      run:
        - python >=${{ python_min }}
        - jupyter_server >=2.4,<3
        - importlib-metadata >=5.2.0
        - pydantic >=2.10.0,<3
        - dask-core
        - distributed
        - faiss-cpu >=1.8.0,<2
        - traitlets >=5.6,<6
        - deepmerge >=2.0,<3
        # The special `pin_subpackage()` Jinja function is used to define
        # dependencies between outputs in the same recipe.
        #
        # Given version "1.2.3", this expression specifies the version range ">=1.2.3,<2".
        # In other words, this requires `jupyter_ai_magics` to be at least the
        # same version as `jupyter_ai`, but not a higher major version.
        - ${{ pin_subpackage('jupyter-ai-magics', lower_bound="x.x.x", upper_bound="x") }}

    tests:
      - python:
          imports:
            - jupyter_ai
          # We cannot run `pip check` in JAI v2 due to `faiss-cpu` being packaged
          # differently on PyPI & Conda Forge.
          #
          # In both distributions, the `faiss-cpu` module is provided, but the
          # `faiss-cpu` package wheel is only provided in the PyPI distribution.
          # This causes `pip check` to fail when JAI v2 is installed from Conda
          # Forge. JAI v3 removes `faiss-cpu` and does not suffer this issue.
          #
          pip_check: false
          python_version: ${{ python_min }}.*

    about:
      summary: "A JupyterLab extension providing chats with AI personas."

  - package:
      name: jupyter-ai-magics
      version: ${{ version }}

    source:
      url: https://pypi.org/packages/source/j/jupyter-ai-magics/jupyter_ai_magics-${{ version }}.tar.gz
      sha256: c6d77a29b19e520ff1113fb92c4830df4154e322c917a4c356739440450721e4

    build:
      noarch: python
      script: ${{ PYTHON }} -m pip install . -vv
      number: ${{ build_number }}

    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling >=1.4.0
        - hatch-nodejs-version
        - pip
        - hatch-jupyter-builder
      run:
        - python >=${{ python_min }}
        - ipython
        - importlib-metadata >=5.2.0
        - langchain >=0.3.0,<0.4.0
        - langchain-community >=0.3.0,<0.4.0
        - pydantic >=2.10.0,<3.0
        - click >=8.1,<9
        - jsonpath-ng >=1.5.3,<2

    tests:
      - python:
          imports:
            - jupyter_ai_magics
          pip_check: true
          python_version: ${{ python_min }}.*

    about:
      summary: "A package that provides the `%ai` and `%%ai` magic commands in IPython, used in Jupyter Notebook & JupyterLab."

about:
  homepage: https://github.com/jupyterlab/jupyter-ai
  repository: https://github.com/jupyterlab/jupyter-ai
  documentation: https://jupyter-ai.readthedocs.io/en/v2/
  license: BSD-3-Clause
  license_file: LICENSE
  # `about.summary` should be overwritten by `outputs[].about.summary` for each
  # output. This is only present to suppress a warning raised by the
  # `conda-forge-linting` service.
  summary: "Placeholder summary used in the `jupyter-ai-monorepo` recipe."

extra:
  recipe-maintainers:
    - dlqqq
    - 3coins
    - andrii-i
    - srdas
